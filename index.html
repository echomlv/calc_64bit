<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嵌入式小工具</title>
<style>
  :root {
    --cell: 30px;
    --gap: 4px;
  }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    margin: 24px;
    color: #222;
    -webkit-font-smoothing: antialiased;
  }
  h3 { margin: 18px 0 10px; }
  .toolbar { margin: 4px 0 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  button {
    font-size: 13px;
    padding: 5px 12px;
    border: 1px solid #aaa;
    background: #f5f5f5;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover { background: #e9e9e9; }
  button:active { background: #ddd; }
  .width-toggle { margin-left: 8px; }
  .width-toggle .active { background: #2d7dd2; color: #fff; border-color: #2d7dd2; }

  /* 位选择区：横向可滚动，索引行与方格行对齐 */
  .bits-scroll { overflow-x: auto; padding-bottom: 6px; }
  .bits-row {
    display: grid;
    grid-auto-flow: column;
    gap: var(--gap);
    width: max-content;
    margin-bottom: 10px;
  }
  .bits-row:last-child { margin-bottom: 0; }
  .bit-col { display: flex; flex-direction: column; align-items: center; }
  .bit-index {
    font-size: 11px;
    color: #555;
    height: 16px;
    line-height: 16px;
    user-select: none;
  }
  .bit-cell {
    width: var(--cell);
    height: var(--cell);
    border: 1px solid #999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    cursor: pointer;
    background: #fff;
    box-sizing: border-box;
    user-select: none;
  }
  .bit-cell.on {
    background: #2d7dd2;
    color: #fff;
    border-color: #2d7dd2;
    font-weight: 600;
  }
  /* 字节边界（每个字节的两端，如 bit 0 与 bit 7）加粗强调 */
  .bit-cell.byte-edge {
    font-weight: 700;
    border-width: 2px;
    border-color: #555;
  }
  .bit-cell.byte-edge.on { border-color: #1b5fa6; }
  .bit-index.byte-edge { font-weight: 700; color: #222; }
  /* 每个字节之间留出分隔间距 */
  .bit-col.byte-gap { margin-right: 10px; }

  .result-row { margin: 8px 0; display: flex; align-items: center; gap: 8px; }
  .result-label { display: inline-block; width: 72px; color: #333; }
  .bin-value { font-family: ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: 1px; word-break: break-all; }
  input.num {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 14px;
    padding: 4px 6px;
    border: 1px solid #999;
    border-radius: 3px;
    min-width: 220px;
  }
  input.num.invalid { border-color: #d33; background: #fff3f3; }
  .hint { color: #888; font-size: 12px; }

  /* 顶部标签页 */
  .tabs { display: flex; gap: 6px; border-bottom: 1px solid #ddd; margin-bottom: 18px; }
  .tabs button {
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    border-radius: 0;
    padding: 8px 14px;
    font-size: 14px;
    color: #555;
  }
  .tabs button:hover { background: #f2f2f2; }
  .tabs button.active {
    color: #2d7dd2;
    border-bottom-color: #2d7dd2;
    font-weight: 600;
    background: transparent;
  }
  .panel { display: none; }
  .panel.active { display: block; }
  /* 输入框后显示的「另一种进制」 */
  .alt {
    color: #2d7dd2;
    font-size: 13px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    margin-left: 6px;
  }
  .hint code {
    background: #f0f0f0;
    padding: 1px 4px;
    border-radius: 3px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .opt { font-size: 13px; color: #333; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }

  /* 程序员计算器 */
  .seg { display: inline-flex; gap: 0; }
  .seg button { border-radius: 0; }
  .seg button:first-child { border-radius: 4px 0 0 4px; }
  .seg button:last-child { border-radius: 0 4px 4px 0; margin-left: -1px; }
  .seg button.active { background: #2d7dd2; color: #fff; border-color: #2d7dd2; }
  #calcStatus { color: #888; font-size: 13px; min-height: 18px; }
  #calcStatus.err { color: #d33; }
  .calc-pad {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    max-width: 760px;
    margin-top: 8px;
  }
  .calc-pad button {
    height: 44px;
    font-size: 15px;
    background: #fafafa;
  }
  .calc-pad button.key-digit { color: #b5500f; font-weight: 600; }
  .calc-pad button.key-hex { color: #7a3ea6; font-weight: 600; }
  .calc-pad button.key-arith { color: #1b5fa6; }
  .calc-pad button.key-bit { color: #1f7a3d; }
  .calc-pad button.key-edit { color: #555; }
  .calc-pad button:hover { background: #eee; }
  .calc-pad button:disabled { opacity: .35; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="tabs">
    <button id="tabBits" class="active">位计算器</button>
    <button id="tabSize">容量换算</button>
  </div>

  <section id="panelBits" class="panel active">
  <h3>二进制位选择:</h3>
  <div class="bits-scroll" id="bitsContainer"></div>

  <div class="toolbar">
    <button id="btnLeft">左移 &lt;&lt;</button>
    <button id="btnRight">右移 &gt;&gt;</button>
    <button id="btnClear">清零</button>
    <span class="width-toggle">
      位宽:
      <button id="btn32">32bit</button>
      <button id="btn64">64bit</button>
    </span>
  </div>

  <h3>结果:</h3>
  <div class="result-row">
    <span class="result-label">二进制:</span>
    <span class="bin-value" id="binValue"></span>
  </div>
  <div class="result-row">
    <span class="result-label">十进制:</span>
    <input class="num" id="decInput" type="text" autocomplete="off" spellcheck="false">
  </div>
  <div class="result-row">
    <span class="result-label">十六进制:</span>
    <input class="num" id="hexInput" type="text" autocomplete="off" spellcheck="false">
    <span class="hint">（不含 0x 前缀，回车或失焦后生效）</span>
  </div>

  <h3>程序员计算器:</h3>
  <div class="toolbar">
    <span class="seg" id="calcWidthSeg">
      <button id="calcBtn32" class="active">32bit</button>
      <button id="calcBtn64">64bit</button>
    </span>
    <span class="seg" id="calcSignSeg">
      <button id="calcUnsigned">Unsigned</button>
      <button id="calcSigned" class="active">Signed</button>
    </span>
    <span class="seg" id="calcBaseSeg">
      <button id="calcInHex">Hex</button>
      <button id="calcInDec" class="active">Dec</button>
    </span>
    <span class="hint">独立计算器：键盘可直接输入表达式，支持 ( ) 与运算优先级；= 求值</span>
  </div>

  <div class="result-row">
    <span class="result-label">表达式:</span>
    <input class="num" id="calcExpr" type="text" autocomplete="off" spellcheck="false" style="min-width:420px">
  </div>
  <div class="result-row">
    <span class="result-label">过程:</span>
    <span class="bin-value" id="calcProcess"></span>
  </div>
  <div class="result-row">
    <span class="result-label">十进制:</span>
    <span class="bin-value" id="calcDec">0</span>
  </div>
  <div class="result-row">
    <span class="result-label">十六进制:</span>
    <span class="bin-value" id="calcHex">0x0</span>
  </div>
  <div class="result-row">
    <span class="result-label">二进制:</span>
    <span class="bin-value" id="calcBin"></span>
  </div>
  <div class="result-row">
    <span class="result-label"></span>
    <span id="calcStatus"></span>
  </div>

  <div class="calc-pad">
    <button class="key-hex" data-digit="D">D</button>
    <button class="key-hex" data-digit="E">E</button>
    <button class="key-hex" data-digit="F">F</button>
    <button class="key-arith" data-op="/">&divide;</button>
    <button class="key-edit" data-act="back">Back</button>
    <button class="key-edit" data-act="ce">CE</button>
    <button class="key-edit" data-act="c">C</button>

    <button class="key-hex" data-digit="A">A</button>
    <button class="key-hex" data-digit="B">B</button>
    <button class="key-hex" data-digit="C">C</button>
    <button class="key-arith" data-op="*">&times;</button>
    <button class="key-edit" data-act="neg">+/-</button>
    <button class="key-bit" data-op="ROL">RoL</button>
    <button class="key-bit" data-op="ROR">RoR</button>

    <button class="key-digit" data-digit="7">7</button>
    <button class="key-digit" data-digit="8">8</button>
    <button class="key-digit" data-digit="9">9</button>
    <button class="key-arith" data-op="-">&minus;</button>
    <button class="key-arith" data-op="%">MOD</button>
    <button class="key-bit" data-op="&lt;&lt;">&lt;&lt;</button>
    <button class="key-bit" data-op="&gt;&gt;">&gt;&gt;</button>

    <button class="key-digit" data-digit="4">4</button>
    <button class="key-digit" data-digit="5">5</button>
    <button class="key-digit" data-digit="6">6</button>
    <button class="key-arith" data-op="+">+</button>
    <button class="key-bit" data-unary="NOT">NOT</button>
    <button class="key-edit" data-ins="(">(</button>
    <button class="key-edit" data-ins=")">)</button>

    <button class="key-digit" data-digit="1">1</button>
    <button class="key-digit" data-digit="2">2</button>
    <button class="key-digit" data-digit="3">3</button>
    <button class="key-arith" data-act="eq">=</button>
    <button class="key-bit" data-op="AND">AND</button>
    <button class="key-bit" data-op="OR">OR</button>
    <button class="key-bit" data-op="XOR">XOR</button>

    <button class="key-digit" data-digit="0">0</button>
    <span></span>
    <span></span>
    <span></span>
    <button class="key-bit" data-op="NAND">NAND</button>
    <button class="key-bit" data-op="NOR">NOR</button>
    <button class="key-bit" data-op="XNOR">XNOR</button>
  </div>
  </section>

  <section id="panelSize" class="panel">
  <h3>数据容量换算（1 KB = 1024 Byte）:</h3>
  <div class="result-row">
    <span class="result-label">Byte:</span>
    <input class="num size-input" id="sizeByte" data-unit="Byte" type="text" autocomplete="off" spellcheck="false">
    <span class="alt"></span>
  </div>
  <div class="result-row">
    <span class="result-label">KB:</span>
    <input class="num size-input" id="sizeKB" data-unit="KB" type="text" autocomplete="off" spellcheck="false">
    <span class="alt"></span>
  </div>
  <div class="result-row">
    <span class="result-label">MB:</span>
    <input class="num size-input" id="sizeMB" data-unit="MB" type="text" autocomplete="off" spellcheck="false">
    <span class="alt"></span>
  </div>
  <div class="result-row">
    <span class="result-label">GB:</span>
    <input class="num size-input" id="sizeGB" data-unit="GB" type="text" autocomplete="off" spellcheck="false">
    <span class="alt"></span>
  </div>
  <div class="result-row">
    <span class="result-label">TB:</span>
    <input class="num size-input" id="sizeTB" data-unit="TB" type="text" autocomplete="off" spellcheck="false">
    <span class="alt"></span>
  </div>
  <div class="toolbar">
    <button id="btnSizeClear">清零</button>
    <label class="opt"><input type="checkbox" id="groupToggle" checked> 十六进制每 4 位空格隔开</label>
  </div>
  <div class="toolbar">
    <span class="hint">十进制直接输入；十六进制以 <code>0x</code> 开头（如 <code>0x400</code>）。输入什么进制，各框结果就用什么进制显示；输入框后显示另一种进制。</span>
  </div>
  </section>

<script>
(function () {
  "use strict";

  // ---- 单一数据源 ----
  let value = 0n;
  let width = 64n;             // 32n 或 64n
  let mask = (1n << width) - 1n;

  const bitsContainer = document.getElementById("bitsContainer");
  const binValue = document.getElementById("binValue");
  const decInput = document.getElementById("decInput");
  const hexInput = document.getElementById("hexInput");

  // ---- 构建 bit 方格（高位在左，bit0 在右；每行 32 位） ----
  function buildBits() {
    bitsContainer.innerHTML = "";
    const n = Number(width);
    const perRow = 32;
    // 64bit -> 两行 [63..32]、[31..0]；32bit -> 一行 [31..0]
    for (let start = n - 1; start >= 0; start -= perRow) {
      const end = Math.max(0, start - perRow + 1);
      const row = document.createElement("div");
      row.className = "bits-row";
      for (let i = start; i >= end; i--) {
        // 字节边界：每个字节的两端位（如 bit 0 与 bit 7）
        const isByteEdge = (i % 8 === 0) || (i % 8 === 7);

        const col = document.createElement("div");
        col.className = "bit-col" + (i % 8 === 0 && i !== end ? " byte-gap" : "");

        const idx = document.createElement("div");
        idx.className = "bit-index" + (isByteEdge ? " byte-edge" : "");
        idx.textContent = i;

        const cell = document.createElement("div");
        cell.className = "bit-cell" + (isByteEdge ? " byte-edge" : "");
        cell.dataset.bit = i;
        cell.addEventListener("click", function () {
          value ^= (1n << BigInt(i));
          value &= mask;
          render();
        });

        col.appendChild(idx);
        col.appendChild(cell);
        row.appendChild(col);
      }
      bitsContainer.appendChild(row);
    }
  }

  // ---- 渲染所有视图 ----
  function render() {
    const bin = value.toString(2).padStart(Number(width), "0");

    // bit 方格
    const cells = bitsContainer.querySelectorAll(".bit-cell");
    cells.forEach(function (cell) {
      const i = Number(cell.dataset.bit);
      const on = (value >> BigInt(i)) & 1n;
      cell.textContent = on ? "1" : "0";
      cell.classList.toggle("on", on === 1n);
    });

    binValue.textContent = bin;

    // 输入框回写保护：正在编辑时不覆盖
    if (document.activeElement !== decInput) {
      decInput.value = value.toString(10);
      decInput.classList.remove("invalid");
    }
    if (document.activeElement !== hexInput) {
      hexInput.value = value.toString(16).toUpperCase();
      hexInput.classList.remove("invalid");
    }
  }

  // ---- 位宽切换 ----
  function setWidth(w) {
    width = w;
    mask = (1n << width) - 1n;
    value &= mask;            // 64->32 截断高位
    document.getElementById("btn32").classList.toggle("active", width === 32n);
    document.getElementById("btn64").classList.toggle("active", width === 64n);
    buildBits();
    render();
  }

  // ---- 输入解析 ----
  function applyDec() {
    const s = decInput.value.trim();
    try {
      const v = s === "" ? 0n : BigInt(s);
      if (v < 0n) throw new Error("negative");
      value = v & mask;
      decInput.classList.remove("invalid");
      render();
    } catch (e) {
      decInput.classList.add("invalid");
    }
  }

  function applyHex() {
    let s = hexInput.value.trim();
    if (s.toLowerCase().startsWith("0x")) s = s.slice(2);
    try {
      const v = s === "" ? 0n : BigInt("0x" + s);
      value = v & mask;
      hexInput.classList.remove("invalid");
      render();
    } catch (e) {
      hexInput.classList.add("invalid");
    }
  }

  // ---- 事件绑定 ----
  document.getElementById("btnLeft").addEventListener("click", function () {
    value = (value << 1n) & mask;
    render();
  });
  document.getElementById("btnRight").addEventListener("click", function () {
    value = value >> 1n;
    render();
  });
  document.getElementById("btnClear").addEventListener("click", function () {
    value = 0n;
    render();
  });
  document.getElementById("btn32").addEventListener("click", function () { setWidth(32n); });
  document.getElementById("btn64").addEventListener("click", function () { setWidth(64n); });

  decInput.addEventListener("blur", applyDec);
  decInput.addEventListener("keydown", function (e) { if (e.key === "Enter") { applyDec(); decInput.blur(); } });
  hexInput.addEventListener("blur", applyHex);
  hexInput.addEventListener("keydown", function (e) { if (e.key === "Enter") { applyHex(); hexInput.blur(); } });

  // ---- 初始化 ----
  setWidth(64n);
})();

// ===== 数据容量换算 =====
(function () {
  "use strict";

  // 1024 进位；以 Byte 为内部规范值（double，~2^53 内精确，覆盖约 8192 TB，
  // 本工具场景足够；超大数或多单位高精度小数可能有浮点误差，可接受）。
  const FACTORS = { Byte: 1, KB: 1024, MB: 1024 ** 2, GB: 1024 ** 3, TB: 1024 ** 4 };
  const inputs = Array.from(document.querySelectorAll(".size-input"));
  const altOf = (el) => el.parentNode.querySelector(".alt");
  const groupToggle = document.getElementById("groupToggle");
  // 当前显示进制：跟随最近一次输入框使用的进制（10 或 16）
  let displayBase = 10;
  // 最近一次的规范值（Byte，null 表示空）；用于切换分组开关时重新渲染
  let lastBytes = null;

  // 十进制格式化：最多 6 位小数，去掉末尾多余的 0 与小数点
  function fmtDec(n) {
    if (n === 0) return "0";
    let s = n.toFixed(6);
    if (s.indexOf(".") >= 0) s = s.replace(/0+$/, "").replace(/\.$/, "");
    return s;
  }

  // 整数部分从右往左每 4 位插入一个空格："40000000" -> "4000 0000"
  function group4(s) { return s.replace(/\B(?=(.{4})+$)/g, " "); }

  // 十六进制格式化：0x 开头，整数部分每 4 位空格隔开（受分组开关控制）；
  // 小数部分（来自 1024=2^10 的整除，多为有限位）截断到 8 位
  function fmtHex(n) {
    if (n === 0) return "0x0";
    let ip = n.toString(16), fp = "";
    if (ip.indexOf(".") >= 0) {
      [ip, fp] = ip.split(".");
      fp = fp.slice(0, 8).replace(/0+$/, "");
    }
    ip = ip.toUpperCase();
    let out = "0x" + (groupToggle.checked ? group4(ip) : ip);
    if (fp) out += "." + fp.toUpperCase();
    return out;
  }

  const fmtInBase = (n, base) => (base === 16 ? fmtHex(n) : fmtDec(n));

  // 解析输入：先去掉所有空格（十六进制显示用空格分组），再判断进制。
  // 0x 前缀 -> 十六进制（支持小数），否则十进制。返回 { ok, empty, base, value }
  function parseInput(raw) {
    const s = raw.replace(/\s+/g, "");
    if (s === "") return { ok: true, empty: true };
    let base = 10, body = s;
    if (/^0x/i.test(s)) { base = 16; body = s.slice(2); }
    const v = base === 16 ? parseHexFloat(body) : (/^\d*\.?\d+$/.test(body) ? Number(body) : NaN);
    if (!isFinite(v) || v < 0) return { ok: false };
    return { ok: true, base, value: v };
  }

  function parseHexFloat(body) {
    const parts = body.split(".");
    if (parts.length > 2) return NaN;
    const ip = parts[0], fp = parts[1] || "";
    if (ip === "" && fp === "") return NaN;
    if (ip && !/^[0-9a-f]+$/i.test(ip)) return NaN;
    if (fp && !/^[0-9a-f]+$/i.test(fp)) return NaN;
    let val = ip ? parseInt(ip, 16) : 0;
    for (let i = 0; i < fp.length; i++) val += parseInt(fp[i], 16) / Math.pow(16, i + 1);
    return val;
  }

  function clearAll() {
    lastBytes = null;
    inputs.forEach((el) => { el.value = ""; el.classList.remove("invalid"); altOf(el).textContent = ""; });
  }

  // 按 lastBytes/displayBase 渲染所有框与其后的「另一种进制」；skip 为正在输入的源框（不覆盖其值）
  function paintAll(skip) {
    if (lastBytes === null) return;
    const otherBase = displayBase === 16 ? 10 : 16;
    inputs.forEach((el) => {
      const val = lastBytes / FACTORS[el.dataset.unit];
      if (el !== skip) { el.value = fmtInBase(val, displayBase); el.classList.remove("invalid"); }
      altOf(el).textContent = "= " + fmtInBase(val, otherBase);
    });
  }

  function update(src) {
    const r = parseInput(src.value);
    if (r.empty) { clearAll(); return; }
    if (!r.ok) { src.classList.add("invalid"); return; }
    src.classList.remove("invalid");
    displayBase = r.base;
    lastBytes = r.value * FACTORS[src.dataset.unit];
    paintAll(src);
  }

  inputs.forEach((el) => {
    el.addEventListener("input", function () { update(el); });
    // 失焦时把用户输入的源框也按当前进制规范化（十六进制即每 4 位空格隔开）
    el.addEventListener("blur", function () {
      const r = parseInput(el.value);
      if (r.ok && !r.empty) el.value = fmtInBase(r.value, r.base);
    });
  });
  document.getElementById("btnSizeClear").addEventListener("click", clearAll);
  // 切换分组开关时，按当前值重新渲染所有框（无聚焦源框）
  groupToggle.addEventListener("change", function () { paintAll(null); });
})();

// ===== 程序员计算器（独立：自有状态与显示，表达式求值，支持括号与优先级） =====
(function () {
  "use strict";

  // ---- 独立状态（不与位计算器共享）；默认 32bit / Signed / Dec ----
  let cwidth = 32n, cmask = (1n << cwidth) - 1n;
  let csigned = true;      // 有符号/无符号（影响十进制显示与 ÷ % >> 语义）
  let cbase = 10;          // 按键/解析进制：16 / 10
  let lastResult = 0n;     // 最近一次求值结果（无符号位模式）
  let justEvaluated = false;

  const exprInput = document.getElementById("calcExpr");
  const procEl = document.getElementById("calcProcess");
  const decEl = document.getElementById("calcDec");
  const hexEl = document.getElementById("calcHex");
  const binEl = document.getElementById("calcBin");
  const statusEl = document.getElementById("calcStatus");

  const toSigned = (x) => ((x >> (cwidth - 1n)) & 1n) ? x - (1n << cwidth) : x;
  const decString = (r) => (csigned ? toSigned(r) : r).toString(10);
  const setStatus = (m, e) => { statusEl.textContent = m || ""; statusEl.classList.toggle("err", !!e); };

  // ---- 运算实现（带位宽掩码 / 有符号语义） ----
  function div(a, b) { if (b === 0n) throw new Error("除数为 0"); return (csigned ? toSigned(a) / toSigned(b) : a / b) & cmask; }
  function mod(a, b) { if (b === 0n) throw new Error("除数为 0"); return (csigned ? toSigned(a) % toSigned(b) : a % b) & cmask; }
  function shl(a, b) { return b >= cwidth ? 0n : (a << b) & cmask; }
  function shr(a, b) {
    if (b >= cwidth) return csigned && ((a >> (cwidth - 1n)) & 1n) ? cmask : 0n;
    return (csigned ? (toSigned(a) >> b) : (a >> b)) & cmask;
  }
  function rol(a, b) { const n = ((b % cwidth) + cwidth) % cwidth; return n === 0n ? (a & cmask) : ((a << n) | (a >> (cwidth - n))) & cmask; }
  function ror(a, b) { const n = ((b % cwidth) + cwidth) % cwidth; return n === 0n ? (a & cmask) : ((a >> n) | (a << (cwidth - n))) & cmask; }

  // 二元运算符：优先级 p（大者先算，左结合）；一元 NOT / 负号优先级最高
  const OPS = {
    "*": { p: 6, f: (a, b) => (a * b) & cmask },
    "/": { p: 6, f: div },
    "%": { p: 6, f: mod },
    "MOD": { p: 6, f: mod },   // 输入 % 或 MOD 等价
    "+": { p: 5, f: (a, b) => (a + b) & cmask },
    "-": { p: 5, f: (a, b) => (a - b) & cmask },
    "<<": { p: 4, f: shl },
    ">>": { p: 4, f: shr },
    "ROL": { p: 4, f: rol },
    "ROR": { p: 4, f: ror },
    "AND": { p: 3, f: (a, b) => (a & b) & cmask },
    "NAND": { p: 3, f: (a, b) => ~(a & b) & cmask },
    "XOR": { p: 2, f: (a, b) => (a ^ b) & cmask },
    "XNOR": { p: 2, f: (a, b) => ~(a ^ b) & cmask },
    "OR": { p: 1, f: (a, b) => (a | b) & cmask },
    "NOR": { p: 1, f: (a, b) => ~(a | b) & cmask },
  };
  const KEYWORDS = new Set(["MOD", "ROL", "ROR", "AND", "NAND", "XOR", "XNOR", "OR", "NOR", "NOT"]);

  // ---- 词法分析 ----
  function tokenize(s) {
    const toks = []; let i = 0; const n = s.length;
    while (i < n) {
      const c = s[i];
      if (c === " " || c === "\t") { i++; continue; }
      if (c === "(" || c === ")") { toks.push({ t: c }); i++; continue; }
      if (c === "<" && s[i + 1] === "<") { toks.push({ t: "op", v: "<<" }); i += 2; continue; }
      if (c === ">" && s[i + 1] === ">") { toks.push({ t: "op", v: ">>" }); i += 2; continue; }
      if (c === "+" || c === "-" || c === "*" || c === "/" || c === "%") { toks.push({ t: "op", v: c }); i++; continue; }
      if (c === "×") { toks.push({ t: "op", v: "*" }); i++; continue; }
      if (c === "÷") { toks.push({ t: "op", v: "/" }); i++; continue; }
      if (c === "−") { toks.push({ t: "op", v: "-" }); i++; continue; }
      if (/[0-9A-Za-z]/.test(c)) {
        let j = i; while (j < n && /[0-9A-Za-z]/.test(s[j])) j++;
        const run = s.slice(i, j); const up = run.toUpperCase(); i = j;
        if (KEYWORDS.has(up)) { toks.push(up === "NOT" ? { t: "not" } : { t: "op", v: up }); continue; }
        if (cbase === 16) {
          if (!/^[0-9A-F]+$/.test(up)) throw new Error("非法字符: " + run);
          toks.push({ t: "num", v: BigInt("0x" + up) & cmask });
        } else {
          if (!/^[0-9]+$/.test(run)) throw new Error("非法字符: " + run);
          toks.push({ t: "num", v: BigInt(run) & cmask });
        }
        continue;
      }
      throw new Error("非法字符: " + c);
    }
    return toks;
  }

  // ---- 调度场算法 -> 逆波兰 ----
  function toRPN(toks) {
    const out = [], ops = []; let prev = null;
    const isValuePrev = () => prev === "num" || prev === ")";
    for (const tk of toks) {
      if (tk.t === "num") { out.push(tk); prev = "num"; }
      else if (tk.t === "not") { ops.push({ t: "u", v: "NOT" }); prev = "op"; }
      else if (tk.t === "op") {
        if ((tk.v === "-" || tk.v === "+") && !isValuePrev()) {
          if (tk.v === "-") ops.push({ t: "u", v: "u-" }); // 一元负号；一元正号忽略
          prev = "op"; continue;
        }
        const p = OPS[tk.v].p;
        while (ops.length) {
          const top = ops[ops.length - 1];
          if (top.t === "(") break;
          const tp = top.t === "u" ? 7 : OPS[top.v].p;
          if (tp >= p) out.push(ops.pop()); else break;
        }
        ops.push({ t: "b", v: tk.v }); prev = "op";
      }
      else if (tk.t === "(") { ops.push({ t: "(" }); prev = "("; }
      else if (tk.t === ")") {
        while (ops.length && ops[ops.length - 1].t !== "(") out.push(ops.pop());
        if (!ops.length) throw new Error("括号不匹配");
        ops.pop(); prev = ")";
      }
    }
    while (ops.length) { const o = ops.pop(); if (o.t === "(") throw new Error("括号不匹配"); out.push(o); }
    return out;
  }

  function evalRPN(rpn) {
    const st = [];
    for (const o of rpn) {
      if (o.t === "num") st.push(o.v);
      else if (o.t === "u") {
        if (!st.length) throw new Error("表达式错误");
        const a = st.pop();
        st.push(o.v === "NOT" ? (~a & cmask) : ((-a) & cmask));
      } else {
        if (st.length < 2) throw new Error("表达式错误");
        const b = st.pop(), a = st.pop();
        st.push(OPS[o.v].f(a, b));
      }
    }
    if (st.length !== 1) throw new Error("表达式错误");
    return st[0] & cmask;
  }

  const evaluate = (s) => evalRPN(toRPN(tokenize(s)));

  // ---- 显示 ----
  function showResult(r) {
    lastResult = r & cmask;
    decEl.textContent = decString(lastResult);
    hexEl.textContent = "0x" + lastResult.toString(16).toUpperCase();
    binEl.textContent = lastResult.toString(2).padStart(Number(cwidth), "0");
  }

  function pressEquals() {
    const s = exprInput.value.trim();
    try {
      const r = s === "" ? 0n : evaluate(s);
      showResult(r);
      procEl.textContent = (s || "0") + " = " + decString(r);
      setStatus("");
      justEvaluated = true;
    } catch (e) { setStatus(e.message || "表达式错误", true); }
  }

  // 求值后接续上次结果的字面量（按当前进制）
  const curResultLiteral = () => cbase === 16 ? lastResult.toString(16).toUpperCase() : decString(lastResult);

  // mode: digit/fresh -> 求值后清空重输；op -> 求值后接上次结果；plain -> 直接追加
  function appendToExpr(str, mode) {
    if (justEvaluated) {
      if (mode === "op") exprInput.value = curResultLiteral();
      else if (mode !== "plain") exprInput.value = "";
      justEvaluated = false;
    }
    exprInput.value += str;
  }

  function pressNeg() {
    if (justEvaluated) { showResult((-lastResult) & cmask); exprInput.value = curResultLiteral(); justEvaluated = false; return; }
    const v = exprInput.value;
    const mw = /\(-([0-9A-Fa-f]+)\)$/.exec(v);     // 已是 (-N) -> 还原 N
    if (mw) { exprInput.value = v.slice(0, mw.index) + mw[1]; return; }
    const m = /[0-9A-Fa-f]+$/.exec(v);             // 末尾数字 -> 包成 (-N)，避免与减号歧义
    if (m) exprInput.value = v.slice(0, m.index) + "(-" + m[0] + ")";
  }

  function onEdit(a) {
    if (a === "back") exprInput.value = exprInput.value.slice(0, -1);
    else if (a === "ce") exprInput.value = "";
    else if (a === "c") { exprInput.value = ""; procEl.textContent = ""; setStatus(""); showResult(0n); justEvaluated = false; }
  }

  // ---- 按键绑定 ----
  document.querySelectorAll(".calc-pad button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      if (btn.dataset.digit !== undefined) return appendToExpr(btn.dataset.digit, "digit");
      if (btn.dataset.op !== undefined) {
        const op = btn.dataset.op;
        return appendToExpr(/^[A-Z]/.test(op) ? " " + op + " " : op, "op");
      }
      if (btn.dataset.unary !== undefined) return appendToExpr(btn.dataset.unary + " ", "fresh");
      if (btn.dataset.ins !== undefined) return appendToExpr(btn.dataset.ins, btn.dataset.ins === "(" ? "fresh" : "plain");
      const a = btn.dataset.act;
      if (a === "eq") return pressEquals();
      if (a === "neg") return pressNeg();
      return onEdit(a);
    });
  });

  exprInput.addEventListener("input", function () { justEvaluated = false; });
  exprInput.addEventListener("keydown", function (e) { if (e.key === "Enter") { pressEquals(); } });

  // ---- 设置切换 ----
  const hexKeys = Array.from(document.querySelectorAll(".calc-pad button[data-digit]")).filter((b) => /[A-F]/.test(b.dataset.digit));
  function refreshAfterSetting() {
    const s = exprInput.value.trim();
    if (s === "") { showResult(lastResult & cmask); return; }
    try { showResult(evaluate(s)); setStatus(""); } catch (e) { showResult(lastResult & cmask); }
  }
  function setCWidth(w) {
    cwidth = w; cmask = (1n << w) - 1n;
    document.getElementById("calcBtn32").classList.toggle("active", w === 32n);
    document.getElementById("calcBtn64").classList.toggle("active", w === 64n);
    refreshAfterSetting();
  }
  function setCSigned(on) {
    csigned = on;
    document.getElementById("calcSigned").classList.toggle("active", on);
    document.getElementById("calcUnsigned").classList.toggle("active", !on);
    showResult(lastResult);
  }
  function setCBase(b) {
    cbase = b;
    document.getElementById("calcInHex").classList.toggle("active", b === 16);
    document.getElementById("calcInDec").classList.toggle("active", b === 10);
    hexKeys.forEach((k) => { k.disabled = (b !== 16); });
  }
  document.getElementById("calcBtn32").addEventListener("click", () => setCWidth(32n));
  document.getElementById("calcBtn64").addEventListener("click", () => setCWidth(64n));
  document.getElementById("calcSigned").addEventListener("click", () => setCSigned(true));
  document.getElementById("calcUnsigned").addEventListener("click", () => setCSigned(false));
  document.getElementById("calcInHex").addEventListener("click", () => setCBase(16));
  document.getElementById("calcInDec").addEventListener("click", () => setCBase(10));

  setCBase(cbase);   // 同步默认 Dec：禁用 A~F
  showResult(0n);
})();

// ===== 标签页切换 =====
(function () {
  "use strict";
  const tabs = {
    tabBits: "panelBits",
    tabSize: "panelSize",
  };
  Object.keys(tabs).forEach(function (tabId) {
    document.getElementById(tabId).addEventListener("click", function () {
      Object.entries(tabs).forEach(function ([t, p]) {
        const on = t === tabId;
        document.getElementById(t).classList.toggle("active", on);
        document.getElementById(p).classList.toggle("active", on);
      });
    });
  });
})();
</script>
</body>
</html>
